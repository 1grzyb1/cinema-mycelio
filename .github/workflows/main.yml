name: Build and deploy

on:
  push:
    branches: ["main", "master"]

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      OMDB_API_KEY: ${{ secrets.OMDB_API_KEY }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 37.27.71.201
          username: ${{ secrets.DEPLOY_USERNAME }}
          key: ${{ secrets.DEPLOY_PRIVATE_KEY }}
          envs: OMDB_API_KEY,DATABASE_URL
          script_stop: true
          script: |
            set -euo pipefail
            cd cinema-mycelio
            git pull
            docker build -t cinema-mycelio_ui:latest .
            docker stop cinema-mycelio_ui 2>/dev/null || true
            docker rm cinema-mycelio_ui 2>/dev/null || true
            DB_URL="${DATABASE_URL:-/data/local.db}"
            docker run -d \
              --name cinema-mycelio_ui \
              --restart always \
              -p 3010:4173 \
              -v cinema-mycelio-data:/data \
              -e "DATABASE_URL=${DB_URL}" \
              -e "OMDB_API_KEY=${OMDB_API_KEY}" \
              -e BODY_SIZE_LIMIT=10485760 \
              cinema-mycelio_ui:latest
            docker image prune --filter "dangling=true" -f
